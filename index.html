<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu m'aimes ? ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffd1dc,#ffc2d1);
    background-size:400% 400%;
    animation:bg 8s infinite ease;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
color:white;
font-size:42px;
text-shadow:2px 2px 10px rgba(0,0,0,.2);
margin-bottom:30px;
}

.buttons{
display:flex;
gap:20px;
}

button{
border:none;
border-radius:15px;
padding:15px 35px;
font-size:22px;
cursor:pointer;
transition:.3s;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff3b5c;
color:white;
}

.heart{
position:absolute;
color:#ff1744;
font-size:25px;
animation:float 6s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
30%{opacity:1;}
100%{
transform:translateY(-120px) scale(1.4);
opacity:0;
}
}

.message{
animation:zoom .7s ease;
}

@keyframes zoom{
from{
transform:scale(.4);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
</style>
</head>
<body>

<h1>Tu m'aimes ? ❤️</h1>

<div class="buttons">
<button id="yes">Oui ❤️</button>
<button id="no">Non 💔</button>
</div>

<script>

let yes=document.getElementById("yes");
let no=document.getElementById("no");

let yesSize=22;
let noSize=22;

no.onclick=()=>{

yesSize+=14;
noSize-=2;

yes.style.fontSize=yesSize+"px";
yes.style.padding=(15+yesSize/2)+"px "+(35+yesSize)+"px";

if(noSize>6){
no.style.fontSize=noSize+"px";
}else{
no.style.display="none";
}

}

yes.onclick=()=>{

document.body.innerHTML=`

<div class="message" style="
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
padding:20px;
color:white;
">

<h1 style="font-size:48px;">
Arfk bzz 3lik bach drti had Oui 😔💔
</h1>

<h2 style="margin-top:20px;font-size:34px;">
Wlkn rah knbghik bzfff ❤️🥺
</h2>

<h2 style="margin-top:10px;font-size:30px;">
Mat9drich tkhayli 😔❤️
</h2>

<div style="font-size:70px;margin-top:25px;">
❤️🥰💖🌹
</div>

</div>
`;

setInterval(createHeart,150);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*40)+"px";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,350);

</script>

</body>
  </html>
